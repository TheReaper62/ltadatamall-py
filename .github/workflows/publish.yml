name: Publish Package to PyPI

on:
  release:
    types: [published] # Triggers when you click "Publish Release" on GitHub

jobs:
  build-and-publish:
    name: Build distributions and upload securely to PyPI
    runs-on: ubuntu-latest
    
    # CRITICAL: These permissions are required to use OIDC Trusted Publishing
    permissions:
      id-token: write # Allows PyPI to cryptographically verify this GitHub runner
      contents: read  # Allows checkout of your repository code

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python runtime environment
        uses: actions/workflows/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install official packaging build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Compile source and wheel distributions
        run: python -m build

      - name: Publish distribution assets to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # No password tokens or secrets are needed here! 
          # The oidc validation handles authentication under the hood safely.
          environment-name: pypi